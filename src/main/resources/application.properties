spring.application.name=EternaMenteBackend

# PostgreSQL - Render
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:dpg-d81761d0lvsc73961t70-a}/${DATABASE_NAME:eternamente_1pao}
spring.datasource.username=${DATABASE_USERNAME:eterna}
spring.datasource.password=${DATABASE_PASSWORD:jeGxVkBtjV6GAD77RSVOfmi1fbqsXEGq}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway gestiona el esquema; JPA valida contra el esquema existente
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
jwt.secret=${JWT_SECRET:eternamenteSuperSecretKey12345678901234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Ollama Configuration (desarrollo local)
ollama.url=${OLLAMA_URL:http://127.0.0.1:11434/api/generate}
ollama.model=${OLLAMA_MODEL:phi3:mini}
ollama.connect-timeout-ms=${OLLAMA_CONNECT_TIMEOUT_MS:5000}
ollama.read-timeout-ms=${OLLAMA_READ_TIMEOUT_MS:180000}
ollama.max-tokens=${OLLAMA_MAX_TOKENS:520}

# Groq Configuration (producción)
groq.api.key=${GROQ_API_KEY:}
groq.url=${GROQ_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.1-70b-versatile}
groq.connect-timeout-ms=${GROQ_CONNECT_TIMEOUT_MS:10000}
groq.read-timeout-ms=${GROQ_READ_TIMEOUT_MS:60000}
groq.max-tokens=${GROQ_MAX_TOKENS:520}

# CORS Origins (separados por coma)
# Desarrollo: http://localhost:4321,http://localhost:3000
