spring.application.name=EternaMenteBackend

# PostgreSQL (usa variables de entorno para no hardcodear credenciales)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eternamente}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway gestiona el esquema; JPA valida contra el esquema existente
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
